# render.yaml — Infrastructure-as-code for Render
# https://render.com/docs/render-yaml
services:
  - type: web
    name: emnist-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free                     # upgrade to "starter" for more RAM/CPU
    region: oregon
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: FRONTEND_URL
        sync: false                # set manually in Render dashboard after Vercel deploy
      - key: PYTHON_UNBUFFERED
        value: "1"
    autoDeploy: true
